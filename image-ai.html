<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 图像识别工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: #1e1e38;
      border-radius: 16px;
      padding: 40px;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 28px;
      background: linear-gradient(90deg, #00d2ff, #7b2ff7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .upload-zone {
      border: 2px dashed #444;
      border-radius: 12px;
      padding: 50px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 20px;
      position: relative;
    }

    .upload-zone:hover {
      border-color: #7b2ff7;
      background: rgba(123, 47, 247, 0.05);
    }

    .upload-zone.drag-over {
      border-color: #00d2ff;
      background: rgba(0, 210, 255, 0.08);
    }

    .upload-zone.has-image {
      padding: 20px;
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.6;
    }

    .upload-text {
      color: #aaa;
      font-size: 15px;
    }

    .upload-hint {
      color: #666;
      font-size: 12px;
      margin-top: 8px;
    }

    #imageInput {
      display: none;
    }

    #preview {
      max-width: 100%;
      max-height: 350px;
      border-radius: 8px;
      display: none;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-analyze {
      background: linear-gradient(90deg, #7b2ff7, #00d2ff);
      color: white;
      display: none;
    }

    .btn-analyze:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(123, 47, 247, 0.4);
    }

    .btn-analyze:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .result-box {
      margin-top: 24px;
      padding: 20px;
      background: #15152a;
      border-radius: 10px;
      border-left: 3px solid #00d2ff;
      display: none;
    }

    .result-box h3 {
      font-size: 13px;
      color: #00d2ff;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .result-box p {
      line-height: 1.8;
      color: #ddd;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 30px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #7b2ff7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      background: rgba(255,75,75,0.1) !important;
      border-left-color: #ff4b4b !important;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      color: #666;
      font-size: 12px;
      margin-top: 16px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>AI 图像识别</h1>
  <p class="subtitle">本地 Qwen2-VL 2B 模型驱动 · 不上传任何数据到云端</p>

  <!-- 上传区域 -->
  <div class="upload-zone" id="uploadZone">
    <div id="uploadPlaceholder">
      <div class="upload-icon">🖼️</div>
      <div class="upload-text">点击上传图片，或拖拽到此处</div>
      <div class="upload-hint">支持 JPG、PNG、GIF、WebP</div>
    </div>
    <img id="preview" alt="预览">
  </div>
  <input type="file" id="imageInput" accept="image/*">

  <!-- 分析按钮 -->
  <button class="btn btn-analyze" id="analyzeBtn">🔍 开始分析</button>

  <!-- 加载中 -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>AI 正在分析图片...</p>
  </div>

  <!-- 结果 -->
  <div class="result-box" id="resultBox">
    <h3>分析结果</h3>
    <p id="resultText"></p>
  </div>

  <div class="info-row">
    <span>模型: Qwen2-VL 2B</span>
    <span id="inferTime"></span>
  </div>
</div>

<script>
  const uploadZone = document.getElementById('uploadZone');
  const imageInput = document.getElementById('imageInput');
  const preview = document.getElementById('preview');
  const uploadPlaceholder = document.getElementById('uploadPlaceholder');
  const analyzeBtn = document.getElementById('analyzeBtn');
  const loading = document.getElementById('loading');
  const resultBox = document.getElementById('resultBox');
  const resultText = document.getElementById('resultText');
  const inferTime = document.getElementById('inferTime');

  let selectedFile = null;

  // 点击上传区域 → 触发文件选择
  uploadZone.addEventListener('click', () => imageInput.click());

  // 文件选择
  imageInput.addEventListener('change', (e) => {
    if (e.target.files.length > 0) {
      handleFile(e.target.files[0]);
    }
  });

  // 拖拽上传
  uploadZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadZone.classList.add('drag-over');
  });

  uploadZone.addEventListener('dragleave', () => {
    uploadZone.classList.remove('drag-over');
  });

  uploadZone.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length > 0) {
      handleFile(e.dataTransfer.files[0]);
    }
  });

  function handleFile(file) {
    if (!file.type.startsWith('image/')) {
      alert('请上传图片文件');
      return;
    }

    selectedFile = file;
    const reader = new FileReader();
    reader.onload = (e) => {
      preview.src = e.target.result;
      preview.style.display = 'block';
      uploadPlaceholder.style.display = 'none';
      uploadZone.classList.add('has-image');
      analyzeBtn.style.display = 'block';
      resultBox.style.display = 'none';
      loading.style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  // 分析按钮
  analyzeBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    // 显示加载
    analyzeBtn.disabled = true;
    loading.style.display = 'block';
    resultBox.style.display = 'none';

    try {
      const startTime = Date.now();

      // 将图片转成 base64
      const base64 = await fileToBase64(selectedFile);
      const pureBase64 = base64.split(',')[1]; // 去掉 "data:image/xxx;base64," 前缀

      // 调用 Ollama API
      const response = await fetch('http://localhost:11434/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'qwen2-vl:2b',
          prompt: '请用中文描述这张图片的内容。包括：画面主体、颜色、文字内容（如有）、场景氛围。',
          images: [pureBase64],
          stream: false
        })
      });

      if (!response.ok) {
        throw new Error(`API 返回错误: ${response.status}`);
      }

      const data = await response.json();
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

      // 显示结果
      resultText.textContent = data.response;
      resultBox.style.display = 'block';
      resultBox.classList.remove('error');
      inferTime.textContent = `推理耗时: ${elapsed}s`;

    } catch (err) {
      resultText.textContent = '识别失败: ' + err.message + '\n\n请确保 Ollama 正在运行（任务栏有羊驼图标）。';
      resultBox.style.display = 'block';
      resultBox.classList.add('error');
      inferTime.textContent = '';
    } finally {
      analyzeBtn.disabled = false;
      loading.style.display = 'none';
    }
  });

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
</script>

</body>
</html>
